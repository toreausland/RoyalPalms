{% extends "base.html" %}
{% block title %}Last opp dokument — Royal Palms{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-royal"><i class="bi bi-cloud-upload me-2"></i>Last opp dokumenter</h2>
            <a href="{{ url_for('documents.list_documents') }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Tilbake
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data" id="uploadForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="title" class="form-label">Tittel</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Beskrivelse (valgfritt)</label>
                        <textarea class="form-control" id="description" name="description" rows="2"></textarea>
                    </div>

                    <!-- Drag & Drop Zone -->
                    <div class="mb-3">
                        <label class="form-label">Fil</label>
                        <div class="drop-zone" id="dropZone">
                            <div class="drop-zone-content" id="dropContent">
                                <i class="bi bi-cloud-arrow-up display-4 text-royal"></i>
                                <p class="mt-2 mb-1 fw-semibold">Dra og slipp filen hit</p>
                                <p class="text-muted small mb-2">eller</p>
                                <label for="file" class="btn btn-sm btn-outline-royal">
                                    <i class="bi bi-folder2-open me-1"></i>Velg fil
                                </label>
                                <input type="file" class="d-none" id="file" name="file"
                                       accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.html,.xlsx" required>
                                <p class="text-muted small mt-2 mb-0">PDF, DOC, DOCX, JPG, PNG, HTML, XLSX</p>
                            </div>
                            <div class="drop-zone-preview d-none" id="dropPreview">
                                <i class="bi bi-file-earmark-check display-4 text-success"></i>
                                <p class="mt-2 mb-0 fw-semibold" id="fileName"></p>
                                <p class="text-muted small" id="fileSize"></p>
                                <button type="button" class="btn btn-sm btn-outline-danger" id="removeFile">
                                    <i class="bi bi-x-lg me-1"></i>Fjern
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-royal" id="submitBtn">
                            <i class="bi bi-upload me-1"></i>Last opp
                        </button>
                        <a href="{{ url_for('documents.list_documents') }}" class="btn btn-outline-secondary">Avbryt</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('file');
    const dropContent = document.getElementById('dropContent');
    const dropPreview = document.getElementById('dropPreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeFile');
    const titleInput = document.getElementById('title');

    const allowedTypes = ['pdf','doc','docx','jpg','jpeg','png','html','xlsx'];

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function getExt(name) {
        return name.split('.').pop().toLowerCase();
    }

    function showFile(file) {
        if (!allowedTypes.includes(getExt(file.name))) {
            alert('Filtypen er ikke tillatt. Bruk: ' + allowedTypes.join(', '));
            return;
        }
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        dropContent.classList.add('d-none');
        dropPreview.classList.remove('d-none');
        dropZone.classList.add('drop-zone-has-file');

        // Auto-fyll tittel fra filnavn hvis tomt
        if (!titleInput.value.trim()) {
            let name = file.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g, ' ');
            titleInput.value = name.charAt(0).toUpperCase() + name.slice(1);
        }
    }

    function resetDrop() {
        fileInput.value = '';
        dropContent.classList.remove('d-none');
        dropPreview.classList.add('d-none');
        dropZone.classList.remove('drop-zone-has-file');
    }

    // Drag events
    ['dragenter', 'dragover'].forEach(evt => {
        dropZone.addEventListener(evt, function(e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('drop-zone-active');
        });
    });

    ['dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, function(e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('drop-zone-active');
        });
    });

    dropZone.addEventListener('drop', function(e) {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            showFile(files[0]);
        }
    });

    // Click to select
    fileInput.addEventListener('change', function() {
        if (fileInput.files.length > 0) {
            showFile(fileInput.files[0]);
        }
    });

    // Remove file
    removeBtn.addEventListener('click', resetDrop);
})();
</script>
{% endblock %}
